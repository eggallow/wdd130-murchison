<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Rankings | Iris - Gideon</title>
</head>
<body>
    <header>
        <nav>
            <div class="logo-container">
                <img src="images/iris.png" alt="Iris Project Logo" class="logo">
            </div>
                <a href="index.html" class="active">Home</a>
                <a href="about.html">All About Me</a>
                <a href="rankings.html">The Rankings</a>
        </nav>
    </header>
    <main>
        <div class="tabs">
            <button class="tablink active" onclick="openTab(event, 'songs')">
                <h1 class="tab-title">Top Songs</h1>
            </button>
            <button class="tablink" onclick="openTab(event, 'pokemon')">
                <h1 class="tab-title">Favorite Pokemon</h1>
            </button>
        </div>
        <div id="songs" class="tabcontent">
            
        </div>
        <div id="pokemon" class="tabcontent">
            
        </div>
        <!-- JavaScript for the tabs -->
        <script>
            function openTab(evt, tabName) {
                var i, tabcontent, tablinks;
                tabcontent = document.getElementsByClassName("tabcontent");
                for (i = 0; i < tabcontent.length; i++) {
                    tabcontent[i].style.display = "none";
                }
                tablinks = document.getElementsByClassName("tablink");
                for (i = 0; i < tablinks.length; i++) {
                    tablinks[i].className = tablinks[i].className.replace(" active", "");
                }
                document.getElementById(tabName).style.display = "grid";
                evt.currentTarget.className += " active";
            }
        </script>
    </main>
    <footer>
        <p>&copy; 2026 | Gideon Murchison Eamon Galloway Matthew Hilton | Final Project</p>
    </footer>
</body>
</html>
